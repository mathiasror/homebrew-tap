name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # GitHub's Ubuntu 24.04 runner turns on Homebrew's Linux sandbox, which
  # needs rootless Bubblewrap — but noble blocks unprivileged user
  # namespaces via AppArmor, so `bwrap` can't create the sandbox and
  # `brew test-bot --only-setup` aborts. Disable the Linux sandbox in CI
  # (Homebrew's own documented fallback). No effect on macOS.
  HOMEBREW_NO_SANDBOX_LINUX: 1

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'
