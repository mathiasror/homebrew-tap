name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      # Homebrew enables HOMEBREW_SANDBOX_LINUX on the GitHub-hosted Ubuntu
      # image but `bwrap` isn't preinstalled, so `brew test-bot --only-setup`
      # aborts without it. Not needed on macOS (no Linux sandbox there).
      - name: Install Bubblewrap (Linux sandbox dependency)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'
